<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .stwrap{width:540px;display:flex;flex-direction:column;gap:16px}
 .strow{display:flex;align-items:center;gap:12px}
 .strow .lab{width:120px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:14px}
 .strow.sel .lab{color:var(--cyan)}
 .stbar{flex:1}
 .sttick{position:absolute;top:-3px;width:3px;height:22px;background:var(--ok);box-shadow:0 0 6px var(--ok)}
 .stq b{color:var(--cyan)}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Signal Tuner", de: "Signal-Tuner" }, difficulty: 3,
  desc: { en: "Adjust the parameters to lock onto the hidden signal, then hold the quality high until it decodes.",
          de: "Justiere die Parameter auf das verborgene Signal und halte die Qualität hoch, bis es dekodiert ist." },
  hint: { en: "← → select · ↑ ↓ adjust", de: "← → wählen · ↑ ↓ justieren" },
  help: [{ en: "← → : choose a parameter", de: "← → : Parameter wählen" }, { en: "↑ ↓ : raise / lower it", de: "↑ ↓ : erhöhen / senken" },
         { en: "Keep quality above the line until the decode bar fills", de: "Halte die Qualität über der Linie, bis der Dekodierbalken voll ist" }],
  create: function (api) {
    var names = [{ en: "Frequency", de: "Frequenz" }, { en: "Amplitude", de: "Amplitude" }, { en: "Filter", de: "Filter" }];
    var wrap = api.el('div', 'stwrap', api.stage);
    var fills = [], rows = [];
    for (var i = 0; i < 3; i++) {
      var row = api.el('div', 'strow', wrap); rows.push(row);
      api.el('div', 'lab', row, api.t(names[i]));
      var bar = api.el('div', 'bbts-bar stbar', row); bar.style.position = 'relative';
      var f = api.el('span', null, bar); fills.push(f);
      var tick = api.el('div', 'sttick', bar); tick.dataset.tick = i;
    }
    var qrow = api.el('div', 'strow stq', wrap); api.el('div', 'lab', qrow, api.t({ en: "Quality", de: "Qualität" }));
    var qbarWrap = api.el('div', 'bbts-bar stbar', qrow); qbarWrap.style.position = 'relative';
    var qfill = api.el('span', null, qbarWrap); var qline = api.el('div', 'sttick', qbarWrap); qline.style.background = 'var(--warn)'; qline.style.boxShadow = '0 0 6px var(--warn)';
    var drow = api.el('div', 'strow', wrap); api.el('div', 'lab', drow, api.t({ en: "Decode", de: "Dekodierung" }));
    var dbarWrap = api.el('div', 'bbts-bar stbar', drow); var dfill = api.el('span', null, dbarWrap); dfill.style.background = 'linear-gradient(90deg,#2a8bb0,#7CFFB0)';

    var val = [0.5, 0.5, 0.5], target = [0, 0, 0], sel = 0, decode = 0, req = 0.85, time = 0, done = false;
    function reset() {
      for (var i = 0; i < 3; i++) { val[i] = 0.5; target[i] = 0.15 + Math.random() * 0.7; }
      sel = 0; decode = 0; time = 0; done = false;
      qline.style.left = (req * 100) + '%'; render(); api.hud({ quality: '0%' });
    }
    function render() {
      for (var i = 0; i < 3; i++) { fills[i].style.width = (val[i] * 100) + '%'; rows[i].classList.toggle('sel', i === sel);
        var tick = rows[i].querySelector('.sttick'); tick.style.left = (target[i] * 100) + '%'; tick.style.display = decode > 0.0 ? 'block' : (api.now() < 0 ? 'none' : 'block'); }
    }
    api.bind('Left', function () { sel = (sel + 2) % 3; render(); });
    api.bind('Right', function () { sel = (sel + 1) % 3; render(); });
    var rep = 0;
    api.loop(function (dt) {
      if (done) return;
      rep += dt; if (rep > 0.05) { rep = 0; if (api.held('Up')) val[sel] = Math.min(1, val[sel] + 0.02); if (api.held('Down')) val[sel] = Math.max(0, val[sel] - 0.02); }
      var err = 0; for (var i = 0; i < 3; i++) err += Math.abs(val[i] - target[i]); var q = Math.max(0, 1 - err / 1.6);
      qfill.style.width = (q * 100) + '%'; qfill.style.background = q >= req ? 'linear-gradient(90deg,#2a8bb0,#7CFFB0)' : 'linear-gradient(90deg,#2a8bb0,#46d6ff)';
      api.hud({ quality: Math.round(q * 100) + '%' });
      if (q >= req) decode = Math.min(1, decode + dt / 5); else decode = Math.max(0, decode - dt * 0.25);
      dfill.style.width = (decode * 100) + '%';
      for (var j = 0; j < 3; j++) fills[j].style.width = (val[j] * 100) + '%';
      time += dt;
      if (decode >= 1) { done = true; var rating = time < 35 ? 3 : time < 70 ? 2 : 1; api.complete({ score: Math.max(50, 1200 - Math.round(time * 8)), rating: rating }); }
      else if (time > 120) { done = true; api.fail({ score: Math.round(decode * 200) }); }
    });
    return { start: reset };
  }
});
</script></body></html>
