<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Planet Scanner", de: "Planeten-Scanner" }, difficulty: 2,
  desc: { en: "Pulse-scan the planet to locate hidden signatures. Each scan reveals how close you are — find them all before the scan energy is gone.",
          de: "Scanne den Planeten, um verborgene Signaturen zu orten. Jeder Scan zeigt, wie nah du bist — finde alle, bevor die Scan-Energie aus ist." },
  hint: { en: "Click the planet to scan — warmer = closer", de: "Planet anklicken zum Scannen — wärmer = näher" },
  help: [{ en: "Click to pulse-scan; a hit marks a signature", de: "Klicken zum Scannen; ein Treffer markiert eine Signatur" },
         { en: "A miss shows a warmth ring — orange is close, blue is far", de: "Ein Fehlschlag zeigt einen Wärmering — orange ist nah, blau ist fern" }],
  create: function (api) {
    var W = 460, H = 460, ctx = api.canvas(W, H).getContext('2d');
    var cx = W / 2, cy = H / 2, R = 200;
    var pts, found, scans, ripples, done;
    function reset() {
      pts = []; found = 0; scans = 18; done = false; ripples = [];
      for (var i = 0; i < 5; i++) { var a = Math.random() * 7, r = Math.random() * (R - 30); pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r, found: false }); }
      api.hud({ found: '0/5', scans: scans }); draw();
    }
    api.pointer(function (p) {
      if (p.type !== 'down' || done) return;
      if (Math.hypot(p.x - cx, p.y - cy) > R) return;
      var best = -1, bd = 1e9; for (var i = 0; i < pts.length; i++) { if (pts[i].found) continue; var d = Math.hypot(pts[i].x - p.x, pts[i].y - p.y); if (d < bd) { bd = d; best = i; } }
      if (best >= 0 && bd < 26) { pts[best].found = true; found++; api.hud({ found: found + '/5' }); }
      else { scans--; api.hud({ scans: scans }); var warm = Math.max(0, 1 - bd / 180); ripples.push({ x: p.x, y: p.y, r: 6, warm: warm, life: 1 }); }
      if (found === 5) { done = true; var rating = scans >= 10 ? 3 : scans >= 4 ? 2 : 1; api.complete({ score: 300 + scans * 30, rating: rating }); return; }
      if (scans <= 0) { done = true; api.fail({ score: found * 60 }); return; }
      draw();
    });
    api.loop(function (dt) { var live = false; for (var i = 0; i < ripples.length; i++) { ripples[i].r += 90 * dt; ripples[i].life -= dt * 1.2; if (ripples[i].life > 0) live = true; } if (live || ripples.length) draw(); });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      var g = ctx.createRadialGradient(cx - 50, cy - 50, 20, cx, cy, R); g.addColorStop(0, '#13314a'); g.addColorStop(1, '#08172a');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(70,214,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
      for (var i = ripples.length - 1; i >= 0; i--) { var rp = ripples[i]; if (rp.life <= 0) { ripples.splice(i, 1); continue; }
        ctx.strokeStyle = 'rgba(' + Math.round(70 + rp.warm * 185) + ',' + Math.round(214 - rp.warm * 100) + ',' + Math.round(255 - rp.warm * 180) + ',' + rp.life + ')';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, 7); ctx.stroke(); }
      for (i = 0; i < pts.length; i++) if (pts[i].found) { ctx.fillStyle = '#7CFFB0'; ctx.shadowColor = '#7CFFB0'; ctx.shadowBlur = 10; ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 7, 0, 7); ctx.fill(); ctx.shadowBlur = 0; }
    }
    return { start: reset };
  }
});
</script></body></html>
