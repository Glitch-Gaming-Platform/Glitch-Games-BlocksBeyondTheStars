<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Docking Simulator", de: "Andock-Simulator" }, difficulty: 4,
  desc: { en: "Nudge the ship onto the docking ring — slowly. Too much speed on contact and you bounce off. You have three attempts.",
          de: "Manövriere das Schiff sachte in den Andockring. Zu viel Tempo beim Kontakt und du prallst ab. Du hast drei Versuche." },
  hint: { en: "↑ thrust · ← → rotate · drift like in space", de: "↑ Schub · ← → drehen · Trägheit wie im All" },
  help: [{ en: "↑ thrust in the facing direction; ← → rotate", de: "↑ Schub in Blickrichtung; ← → drehen" },
         { en: "Glide into the green ring slowly — a hard hit costs an attempt", de: "Gleite langsam in den grünen Ring — ein harter Treffer kostet einen Versuch" }],
  create: function (api) {
    var W = 700, H = 440, ctx = api.canvas(W, H).getContext('2d');
    var s, dock, attempts, done, obstacles;
    function reset() {
      s = { x: 80, y: H / 2, vx: 0, vy: 0, a: 0 }; dock = { x: W - 90, y: 80 + api.rand(H - 160), r: 30 };
      attempts = 3; done = false;
      obstacles = []; var n = api.rand(3); for (var i = 0; i < n; i++) obstacles.push({ x: 220 + api.rand(300), y: 40 + api.rand(H - 80), r: 22 });
      api.hud({ attempts: attempts, speed: '0' });
    }
    function lose() { attempts--; api.hud({ attempts: attempts }); if (attempts <= 0) { done = true; api.fail({ score: 0 }); } else { s = { x: 80, y: H / 2, vx: 0, vy: 0, a: 0 }; } }
    api.loop(function (dt) {
      if (done) return;
      if (api.held('Left')) s.a -= 2.4 * dt; if (api.held('Right')) s.a += 2.4 * dt;
      if (api.held('Up')) { s.vx += Math.cos(s.a) * 70 * dt; s.vy += Math.sin(s.a) * 70 * dt; }
      s.x += s.vx * dt; s.y += s.vy * dt;
      var sp = Math.hypot(s.vx, s.vy); api.hud({ speed: Math.round(sp) });
      if (s.x < 8 || s.x > W - 8 || s.y < 8 || s.y > H - 8) { lose(); return; }
      var i; for (i = 0; i < obstacles.length; i++) { var o = obstacles[i]; if (Math.hypot(o.x - s.x, o.y - s.y) < o.r + 8) { lose(); return; } }
      if (Math.hypot(dock.x - s.x, dock.y - s.y) < dock.r) {
        if (sp < 26) { done = true; var rating = sp < 10 ? 3 : sp < 18 ? 2 : 1; api.complete({ score: Math.max(50, 400 + (3 - (3 - attempts)) * 80 + Math.round((26 - sp) * 6)), rating: rating }); }
        else { lose(); }
        return;
      }
      draw();
    });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      var i; for (i = 0; i < obstacles.length; i++) { var o = obstacles[i]; ctx.fillStyle = 'rgba(255,107,107,0.25)'; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, 7); ctx.fill(); ctx.strokeStyle = '#ff6b6b'; ctx.stroke(); }
      ctx.strokeStyle = '#7CFFB0'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(dock.x, dock.y, dock.r, 0, 7); ctx.stroke();
      ctx.fillStyle = 'rgba(124,255,176,0.12)'; ctx.fill();
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.a); ctx.fillStyle = '#46d6ff'; ctx.shadowColor = '#46d6ff'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-9, -8); ctx.lineTo(-9, 8); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
