<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .rbwrap{width:560px;display:flex;flex-direction:column;gap:18px}
 .rbrow{display:flex;align-items:center;gap:12px}
 .rbrow .lab{width:130px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:14px}
 .rbrow.sel .lab{color:var(--cyan)}
 .rbbar{flex:1;position:relative}
 .rbstab{height:14px}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Reactor Balance", de: "Reaktor-Balance" }, difficulty: 3,
  desc: { en: "Hold every reactor gauge inside its green zone as it drifts. Keep it stable for 60 seconds without a meltdown.",
          de: "Halte jede Reaktoranzeige in ihrer grünen Zone, während sie driftet. Bleib 60 Sekunden stabil ohne Kernschmelze." },
  hint: { en: "← → select gauge · ↑ ↓ adjust", de: "← → Anzeige wählen · ↑ ↓ justieren" },
  help: [{ en: "← → choose a gauge, ↑ ↓ raise/lower it", de: "← → Anzeige wählen, ↑ ↓ erhöhen/senken" },
         { en: "Keep all gauges in their green zones; too long in the red trips a meltdown", de: "Halte alle in den grünen Zonen; zu lange im Roten löst eine Kernschmelze aus" }],
  create: function (api) {
    var names = [{ en: "Temperature", de: "Temperatur" }, { en: "Power", de: "Leistung" }, { en: "Coolant", de: "Kühlung" }];
    var wrap = api.el('div', 'rbwrap', api.stage), rows = [], fills = [];
    for (var i = 0; i < 3; i++) {
      var row = api.el('div', 'rbrow', wrap); rows.push(row); api.el('div', 'lab', row, api.t(names[i]));
      var bar = api.el('div', 'bbts-bar target rbbar', row); var zone = api.el('div', 'zone', bar); var f = api.el('span', null, bar);
      bar._zone = zone; fills.push(f);
    }
    var srow = api.el('div', 'rbrow', wrap); api.el('div', 'lab', srow, api.t({ en: "Stability", de: "Stabilität" }));
    var sfill = api.el('span', null, api.el('div', 'bbts-bar rbstab', srow));
    var val = [0.5, 0.5, 0.5], lo = [0, 0, 0], hi = [0, 0, 0], drift = [0, 0, 0], sel = 0, time, danger, inzone, done, rep;
    function reset() {
      sel = 0; time = 0; danger = 0; inzone = 0; done = false; rep = 0;
      for (var i = 0; i < 3; i++) { val[i] = 0.5; var c = 0.3 + Math.random() * 0.4; lo[i] = c - 0.11; hi[i] = c + 0.11; drift[i] = (Math.random() - 0.5) * 0.06;
        rows[i].querySelector('.zone').style.left = (lo[i] * 100) + '%'; rows[i].querySelector('.zone').style.width = ((hi[i] - lo[i]) * 100) + '%'; }
      render(); api.hud({ stable: '0%' });
    }
    function render() { for (var i = 0; i < 3; i++) { fills[i].style.width = (val[i] * 100) + '%'; var ok = val[i] >= lo[i] && val[i] <= hi[i]; fills[i].style.background = ok ? 'linear-gradient(90deg,#2a8bb0,#7CFFB0)' : 'linear-gradient(90deg,#a0392a,#ff6b6b)'; rows[i].classList.toggle('sel', i === sel); } }
    api.bind('Left', function () { sel = (sel + 2) % 3; render(); }); api.bind('Right', function () { sel = (sel + 1) % 3; render(); });
    api.loop(function (dt) {
      if (done) return; time += dt;
      rep += dt; if (rep > 0.05) { rep = 0; if (api.held('Up')) val[sel] = Math.min(1, val[sel] + 0.025); if (api.held('Down')) val[sel] = Math.max(0, val[sel] - 0.025); }
      var allok = true;
      for (var i = 0; i < 3; i++) { val[i] = Math.max(0, Math.min(1, val[i] + drift[i] * dt + (Math.random() - 0.5) * 0.004)); if (Math.random() < 0.01) drift[i] = (Math.random() - 0.5) * 0.08; if (!(val[i] >= lo[i] && val[i] <= hi[i])) allok = false; }
      if (allok) { inzone += dt; danger = Math.max(0, danger - dt * 1.5); } else { danger += dt; }
      sfill.style.width = Math.min(100, (inzone / 60) * 100) + '%';
      api.hud({ stable: Math.round(Math.min(1, time / 60) * 100) + '%' });
      render();
      if (danger > 6) { done = true; api.fail({ score: Math.round(inzone * 20) }); }
      else if (time >= 60) { done = true; var frac = inzone / time; var rating = frac > 0.85 ? 3 : frac > 0.6 ? 2 : 1; api.complete({ score: Math.round(inzone * 30), rating: rating }); }
    });
    return { start: reset };
  }
});
</script></body></html>
