<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Drone Rescue", de: "Drohnen-Rettung" }, difficulty: 3,
  desc: { en: "Pilot the repair drone to every damaged node, then reach the extraction zone — before energy runs out.",
          de: "Steuere die Reparaturdrohne zu allen beschädigten Knoten und erreiche dann die Extraktionszone — bevor die Energie ausgeht." },
  hint: { en: "← ↑ ↓ → move (collect energy cells, repair nodes, reach exit)", de: "← ↑ ↓ → bewegen (Energie sammeln, Knoten reparieren, Ausgang erreichen)" },
  help: [{ en: "Arrow keys / WASD move the drone (costs energy)", de: "Pfeile / WASD bewegen die Drohne (kostet Energie)" },
         { en: "Step on blue energy cells to refuel, orange nodes to repair", de: "Auf blaue Energiezellen treten zum Tanken, orange Knoten zum Reparieren" },
         { en: "Repair all nodes, then reach the green exit", de: "Alle Knoten reparieren, dann zum grünen Ausgang" }],
  create: function (api) {
    var COLS = 14, ROWS = 10, CELL = 40, W = COLS * CELL, H = ROWS * CELL;
    var ctx = api.canvas(W, H).getContext('2d');
    var wall, drone, energy, repairs, total, cells, exitC, done, repAcc;
    function key(x, y) { return y * COLS + x; }
    function reset() {
      wall = {}; cells = {}; repairs = {}; done = false; repAcc = 0; energy = 100; total = 4;
      for (var x = 0; x < COLS; x++) for (var y = 0; y < ROWS; y++) if (x === 0 || y === 0 || x === COLS - 1 || y === ROWS - 1) wall[key(x, y)] = 1;
      for (var i = 0; i < 16; i++) { var wx = 1 + api.rand(COLS - 2), wy = 1 + api.rand(ROWS - 2); if (!(wx === 1 && wy === 1)) wall[key(wx, wy)] = 1; }
      drone = { x: 1, y: 1 }; wall[key(1, 1)] = 0;
      var done2 = {}; function place(map, n) { var c = 0; while (c < n) { var x = 1 + api.rand(COLS - 2), y = 1 + api.rand(ROWS - 2), k = key(x, y); if (wall[k] || done2[k] || (x === 1 && y === 1)) continue; map[k] = 1; done2[k] = 1; c++; } }
      place(repairs, total); place(cells, 6);
      do { exitC = { x: COLS - 2, y: ROWS - 2 }; } while (wall[key(exitC.x, exitC.y)]);
      wall[key(exitC.x, exitC.y)] = 0;
      api.hud({ energy: energy, repaired: '0/' + total }); draw();
    }
    function step(dx, dy) {
      if (done) return; var nx = drone.x + dx, ny = drone.y + dy, k = key(nx, ny);
      if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS || wall[k]) return;
      drone.x = nx; drone.y = ny; energy -= 1;
      if (cells[k]) { cells[k] = 0; energy = Math.min(150, energy + 25); }
      if (repairs[k]) { repairs[k] = 0; energy -= 4; }
      var left = 0; for (var rk in repairs) if (repairs[rk]) left++;
      api.hud({ energy: Math.max(0, energy), repaired: (total - left) + '/' + total });
      if (energy <= 0) { done = true; api.fail({ score: (total - left) * 50 }); return; }
      if (left === 0 && nx === exitC.x && ny === exitC.y) { done = true; var rating = energy > 60 ? 3 : energy > 25 ? 2 : 1; api.complete({ score: Math.max(50, 300 + energy * 4), rating: rating }); return; }
      draw();
    }
    api.bind('Left', function () { step(-1, 0); }); api.bind('Right', function () { step(1, 0); });
    api.bind('Up', function () { step(0, -1); }); api.bind('Down', function () { step(0, 1); });
    api.loop(function (dt) { repAcc += dt; if (repAcc > 0.12) { repAcc = 0; if (api.held('Left')) step(-1, 0); else if (api.held('Right')) step(1, 0); else if (api.held('Up')) step(0, -1); else if (api.held('Down')) step(0, 1); } });
    function box(x, y, col, pad) { pad = pad || 4; ctx.fillStyle = col; ctx.fillRect(x * CELL + pad, y * CELL + pad, CELL - pad * 2, CELL - pad * 2); }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      var left = 0; for (var rk in repairs) if (repairs[rk]) left++;
      for (var x = 0; x < COLS; x++) for (var y = 0; y < ROWS; y++) { var k = key(x, y);
        if (wall[k]) box(x, y, 'rgba(70,214,255,0.18)', 1);
        else if (cells[k]) { ctx.fillStyle = '#46d6ff'; ctx.beginPath(); ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, 7, 0, 7); ctx.fill(); }
        else if (repairs[k]) box(x, y, '#ffc04d', 9);
      }
      box(exitC.x, exitC.y, left === 0 ? '#7CFFB0' : 'rgba(124,255,176,0.25)', 6);
      ctx.fillStyle = '#7CFFB0'; ctx.shadowColor = '#7CFFB0'; ctx.shadowBlur = 10; box(drone.x, drone.y, '#7CFFB0', 8); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
