<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Orbit Slingshot", de: "Orbit-Schleuder" }, difficulty: 3,
  desc: { en: "Drag from the probe to aim, then release. Use the planets' gravity to curve the probe into the target zone.",
          de: "Ziehe von der Sonde, um zu zielen, dann loslassen. Nutze die Gravitation der Planeten, um die Sonde ins Ziel zu lenken." },
  hint: { en: "Drag from the probe & release to launch", de: "Von der Sonde ziehen & loslassen zum Start" },
  help: [{ en: "Click-drag from the probe to set direction and power", de: "Von der Sonde ziehen, um Richtung und Kraft zu setzen" },
         { en: "Release to launch; gravity bends the path. Reach the green target.", de: "Loslassen zum Start; Gravitation krümmt die Bahn. Erreiche das grüne Ziel." }],
  create: function (api) {
    var W = 720, H = 460, ctx = api.canvas(W, H).getContext('2d');
    var start = { x: 70, y: H / 2 }, planets, target, attempts, aim, probe, flying, done, aimVec;
    function reset() {
      attempts = 5; done = false; flying = false; aim = false; aimVec = null;
      planets = []; var n = 1 + api.rand(2);
      for (var i = 0; i < n; i++) planets.push({ x: 240 + api.rand(280), y: 80 + api.rand(H - 160), mass: 1.2 + Math.random() * 1.6, r: 26 + api.rand(14) });
      target = { x: W - 70, y: 80 + api.rand(H - 160), r: 26 };
      probe = { x: start.x, y: start.y, vx: 0, vy: 0 };
      api.hud({ attempts: attempts }); draw();
    }
    function grav(x, y) {
      var ax = 0, ay = 0;
      for (var i = 0; i < planets.length; i++) { var p = planets[i], dx = p.x - x, dy = p.y - y, d2 = dx * dx + dy * dy, d = Math.sqrt(d2) || 1; var f = 2600 * p.mass / Math.max(d2, 400); ax += f * dx / d; ay += f * dy / d; }
      return [ax, ay];
    }
    function simulate(vx, vy, steps) {
      var pts = [], x = start.x, y = start.y; var dt = 0.5;
      for (var i = 0; i < steps; i++) { var g = grav(x, y); vx += g[0] * dt * 0.02; vy += g[1] * dt * 0.02; x += vx * dt; y += vy * dt; pts.push([x, y]); if (x < 0 || x > W || y < 0 || y > H) break; var hit = false; for (var j = 0; j < planets.length; j++) { var p = planets[j]; if ((p.x - x) * (p.x - x) + (p.y - y) * (p.y - y) < p.r * p.r) { hit = true; break; } } if (hit) break; }
      return pts;
    }
    api.pointer(function (p) {
      if (done || flying) return;
      if (p.type === 'down') { aim = true; aimVec = { x: p.x, y: p.y }; }
      else if (p.type === 'move' && aim) { aimVec = { x: p.x, y: p.y }; draw(); }
      else if (p.type === 'up' && aim) { aim = false; var vx = (aimVec.x - start.x) * 0.06, vy = (aimVec.y - start.y) * 0.06; probe = { x: start.x, y: start.y, vx: vx, vy: vy }; flying = true; }
    });
    api.loop(function (dt) {
      if (!flying || done) { return; }
      for (var s = 0; s < 3; s++) { var g = grav(probe.x, probe.y); probe.vx += g[0] * 0.01; probe.vy += g[1] * 0.01; probe.x += probe.vx; probe.y += probe.vy;
        if ((target.x - probe.x) * (target.x - probe.x) + (target.y - probe.y) * (target.y - probe.y) < target.r * target.r) { done = true; var used = 6 - attempts; var rating = used <= 1 ? 3 : used <= 2 ? 2 : 1; api.complete({ score: Math.max(50, 200 + attempts * 80), rating: rating }); return; }
        var bad = probe.x < -20 || probe.x > W + 20 || probe.y < -20 || probe.y > H + 20;
        for (var j = 0; j < planets.length; j++) { var pl = planets[j]; if ((pl.x - probe.x) * (pl.x - probe.x) + (pl.y - probe.y) * (pl.y - probe.y) < pl.r * pl.r) bad = true; }
        if (bad) { flying = false; attempts--; api.hud({ attempts: attempts }); probe = { x: start.x, y: start.y, vx: 0, vy: 0 }; if (attempts <= 0) { done = true; api.fail({ score: 0 }); } break; }
      }
      draw();
    });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < planets.length; i++) { var p = planets[i]; ctx.fillStyle = 'rgba(70,214,255,0.18)'; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); ctx.strokeStyle = '#46d6ff'; ctx.stroke(); }
      ctx.strokeStyle = '#7CFFB0'; ctx.fillStyle = 'rgba(124,255,176,0.15)'; ctx.beginPath(); ctx.arc(target.x, target.y, target.r, 0, 7); ctx.fill(); ctx.stroke();
      if (aim && aimVec) { var pts = simulate((aimVec.x - start.x) * 0.06, (aimVec.y - start.y) * 0.06, 160); ctx.fillStyle = 'rgba(70,214,255,0.5)'; for (var k = 0; k < pts.length; k += 4) { ctx.beginPath(); ctx.arc(pts[k][0], pts[k][1], 2, 0, 7); ctx.fill(); } }
      ctx.fillStyle = '#7CFFB0'; ctx.shadowColor = '#7CFFB0'; ctx.shadowBlur = 10; ctx.beginPath(); ctx.arc(probe.x, probe.y, 6, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
