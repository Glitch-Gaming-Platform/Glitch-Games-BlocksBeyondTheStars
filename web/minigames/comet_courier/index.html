<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Comet Courier", de: "Kometen-Kurier" }, difficulty: 2,
  desc: { en: "Fly the courier through the debris field, scoop up data packets and dodge asteroids. Reach the end of the run.",
          de: "Flieg den Kurier durch das Trümmerfeld, sammle Datenpakete und weiche Asteroiden aus. Erreiche das Ende der Strecke." },
  hint: { en: "↑ ↓ / mouse steer · avoid asteroids · grab packets", de: "↑ ↓ / Maus steuern · Asteroiden meiden · Pakete sammeln" },
  help: [{ en: "↑ ↓ or the mouse move the ship vertically", de: "↑ ↓ oder die Maus bewegen das Schiff senkrecht" },
         { en: "Collect cyan data packets; asteroids cost shield. Survive the distance.", de: "Sammle cyanfarbene Datenpakete; Asteroiden kosten Schild. Überstehe die Strecke." }],
  create: function (api) {
    var W = 720, H = 440, ctx = api.canvas(W, H).getContext('2d');
    var ship, obs, pks, shield, score, dist, done, spd, sp1, sp2;
    function reset() { ship = { y: H / 2 }; obs = []; pks = []; shield = 3; score = 0; dist = 0; done = false; spd = 230; sp1 = 0; sp2 = 0; api.hud({ score: 0, shield: shield, dist: '0m' }); }
    api.pointer(function (p) { if (p.type === 'move' || p.type === 'down') ship.y = Math.max(20, Math.min(H - 20, p.y)); });
    api.loop(function (dt) {
      if (done) return;
      if (api.held('Up')) ship.y = Math.max(20, ship.y - 280 * dt);
      if (api.held('Down')) ship.y = Math.min(H - 20, ship.y + 280 * dt);
      dist += spd * dt; spd += dt * 4;
      sp1 += dt; if (sp1 > 0.7) { sp1 = 0; obs.push({ x: W + 30, y: 30 + api.rand(H - 60), r: 14 + api.rand(16) }); }
      sp2 += dt; if (sp2 > 0.5) { sp2 = 0; pks.push({ x: W + 20, y: 30 + api.rand(H - 60), got: false }); }
      var i;
      for (i = obs.length - 1; i >= 0; i--) { var o = obs[i]; o.x -= spd * dt; if (o.x < -40) { obs.splice(i, 1); continue; } if (Math.abs(o.x - 70) < o.r + 10 && Math.abs(o.y - ship.y) < o.r + 10) { obs.splice(i, 1); shield--; api.hud({ shield: shield }); if (shield <= 0) { done = true; api.fail({ score: score }); return; } } }
      for (i = pks.length - 1; i >= 0; i--) { var pk = pks[i]; pk.x -= spd * dt; if (pk.x < -20) { pks.splice(i, 1); continue; } if (!pk.got && Math.abs(pk.x - 70) < 18 && Math.abs(pk.y - ship.y) < 18) { pk.got = true; pks.splice(i, 1); score += 15; api.hud({ score: score }); } }
      api.hud({ dist: Math.round(dist) + 'm' });
      if (dist >= 3000) { done = true; var rating = shield >= 3 ? 3 : shield === 2 ? 2 : 1; api.complete({ score: score + shield * 50, rating: rating }); return; }
      draw();
    });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(70,214,255,0.7)'; var k;
      for (k = 0; k < pks.length; k++) { ctx.fillRect(pks[k].x - 6, pks[k].y - 6, 12, 12); }
      ctx.fillStyle = 'rgba(255,107,107,0.85)';
      for (k = 0; k < obs.length; k++) { ctx.beginPath(); ctx.arc(obs[k].x, obs[k].y, obs[k].r, 0, 7); ctx.fill(); }
      ctx.fillStyle = '#7CFFB0'; ctx.shadowColor = '#7CFFB0'; ctx.shadowBlur = 10; ctx.beginPath();
      ctx.moveTo(86, ship.y); ctx.lineTo(54, ship.y - 12); ctx.lineTo(54, ship.y + 12); ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
